<script>
/* === window.storage polyfill using localStorage ===
   Storage.get/set in the app do JSON.parse/stringify,
   so the polyfill stores raw strings as-is. */
if (!window.storage) {
  window.storage = {
    async get(key) {
      const v = localStorage.getItem('hf_' + key);
      return v !== null ? v : null;
    },
    async set(key, value) {
      localStorage.setItem('hf_' + key, String(value));
    },
    async delete(key) {
      localStorage.removeItem('hf_' + key);
    },
    async list() {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('hf_')) keys.push(k.substring(3));
      }
      return keys;
    }
  };
}

</script>

.emoji-grid {

.emoji-btn {

  text-align:center;

.emoji-btn:hover, .emoji-btn:active { background:var(--bg-tertiary); }

/* ========== TOGGLE ========== */
.toggle {
  width:44px;height:24px;
  border-radius:12px;
  background:var(--bg-tertiary);
  position:relative;
  cursor:pointer;
  transition:background 0.3s;
  flex-shrink:0;
}
.toggle.on { background:var(--accent); }
.toggle-knob {
  width:20px;height:20px;
  border-radius:50%;
  background:#fff;
  position:absolute;
  top:2px;left:2px;
  transition:transform 0.3s;
}
.toggle.on .toggle-knob { transform:translateX(20px); }

/* ========== XP FLOAT ========== */
.xp-float {
  position:absolute;
  right:16px;top:0;
  font-size:13px;font-weight:700;
  color:var(--accent-light);
  pointer-events:none;
  animation:float 1s ease-out forwards;
}

/* ========== BADGE ========== */
.badge-item {
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 8px;
  text-align:center;
}
.badge-icon {
  font-size:36px;
  transition:all 0.3s;
}
.badge-icon.locked { filter:grayscale(1); opacity:0.3; }
.badge-name { font-size:11px; color:var(--text-muted); font-weight:500; }

/* ========== LOADING SPINNER ========== */
.spinner {
  width:24px;height:24px;
  border:3px solid var(--bg-tertiary);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.6s linear infinite;
}
</style>

/* =================================================================
   STORAGE UTILITIES
   ================================================================= */

const Storage = {
  async get(key) {
    try { const v = await window.storage.get(key); return v ? JSON.parse(v) : null; }
    catch(e) { console.error('Storage get error:', key, e); return null; }
  },
  async set(key, value) {
    try { await window.storage.set(key, JSON.stringify(value)); return true; }
    catch(e) { console.error('Storage set error:', key, e); return false; }
  },
  async delete(key) {
    try { await window.storage.delete(key); return true; }
    catch(e) { console.error('Storage delete error:', key, e); return false; }
  },
  async list() {
    try { return await window.storage.list(); }
    catch(e) { console.error('Storage list error:', e); return []; }
  },
  async clearAll() {
    try {
      const keys = await this.list();
      for (const key of keys) await this.delete(key);
      return true;
    } catch(e) { console.error('Storage clearAll error:', e); return false; }
  }
};

/* =================================================================
   UTILITY FUNCTIONS
   ================================================================= */

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2,9);
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function getMonthKey(dateStr) {
  return dateStr.substring(0,7);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}

function getDayOfWeek(dateStr) {
  return new Date(dateStr + 'T12:00:00').getDay();
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}

function daysBetween(a, b) {
  return Math.round((new Date(b+'T12:00:00') - new Date(a+'T12:00:00')) / 86400000);
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning! ☀️';
  if (h < 17) return 'Good afternoon! 🌤️';
  if (h < 21) return 'Good evening! 🌅';
  return 'Almost done for today! 🌙';
}

function isHabitScheduledOnDate(habit, dateStr) {
  if (!habit || habit.archived) return false;
  if (habit.startDate && dateStr < habit.startDate) return false;
  if (habit.endDate && dateStr > habit.endDate) return false;
  const dow = getDayOfWeek(dateStr);
  const dayKey = DAY_KEYS[dow];
  if (habit.restDays && habit.restDays.includes(dayKey)) return false;
  if (habit.frequency?.type === 'specific_days') {
    return habit.frequency.days && habit.frequency.days.includes(dayKey);
  }
  return true;
}

function getTimeOfDayLabel(tod) {
  if (tod === 'morning') return '☀️ Morning';
  if (tod === 'afternoon') return '🌤️ Afternoon';
  return '🌙 Evening';
}

function getCategoryColor(cat) {
  return CATEGORY_COLORS[cat] || '#6366f1';
}

function getLevelInfo(xp) {
  let lvl = LEVEL_THRESHOLDS[0];
  for (const t of LEVEL_THRESHOLDS) {
    if (xp >= t.xp) lvl = t; else break;
  }
  const nextIdx = LEVEL_THRESHOLDS.findIndex(t => t.level === lvl.level) + 1;
  const next = nextIdx < LEVEL_THRESHOLDS.length ? LEVEL_THRESHOLDS[nextIdx] : null;
  const xpForNext = next ? next.xp - lvl.xp : 0;
  const xpProgress = next ? xp - lvl.xp : 0;
  return { ...lvl, next, xpForNext, xpProgress, xpTotal: xp };
}

function getXpReward(difficulty) {
  if (difficulty === 'easy') return 5;
  if (difficulty === 'medium') return 10;
  return 20;
}

/* =================================================================
   CONFETTI SYSTEM
   ================================================================= */

function Confetti({ active, onDone }) {
  const [pieces, setPieces] = useState([]);
  useEffect(() => {
    if (!active) return;
    const colors = ['#6366f1','#22c55e','#f59e0b','#ef4444','#ec4899','#06b6d4','#8b5cf6'];
    const p = Array.from({length:50}, (_, i) => ({
      id: i,
      left: Math.random() * 100,
      color: colors[Math.floor(Math.random() * colors.length)],
      delay: Math.random() * 2,
      size: 6 + Math.random() * 8,
      shape: Math.random() > 0.5 ? 'circle' : 'square'
    }));
    setPieces(p);
    const timer = setTimeout(() => { setPieces([]); onDone?.(); }, 3500);
    return () => clearTimeout(timer);
  }, [active]);

  return pieces.map(p => (
    <div key={p.id} className="confetti-piece" style={{
      left: p.left + '%',
      top: -20,
      width: p.size, height: p.size,
      background: p.color,
      borderRadius: p.shape === 'circle' ? '50%' : '2px',
      animationDelay: p.delay + 's',
      animationDuration: (2 + Math.random() * 2) + 's'
    }} />
  ));
}

/* =================================================================
   PROGRESS RING COMPONENT
   ================================================================= */

function ProgressRing({ progress, size = 120, strokeWidth = 8, children }) {
  const radius = (size - strokeWidth) / 2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (progress / 100) * circumference;

  return (
    <div style={{position:'relative',width:size,height:size}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={radius}
          fill="none" stroke="var(--bg-tertiary)" strokeWidth={strokeWidth} />
        <circle cx={size/2} cy={size/2} r={radius}
          fill="none" stroke="var(--accent)" strokeWidth={strokeWidth}
          strokeLinecap="round"
          strokeDasharray={circumference}
          strokeDashoffset={offset}
          className="progress-ring-circle"
          style={{transform:'rotate(-90deg)',transformOrigin:'center'}} />
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        {children}
      </div>
    </div>
  );
}

/* =================================================================
   ONBOARDING FLOW
   ================================================================= */

function Onboarding({ onComplete }) {
  const [step, setStep] = useState(0);
  const [goals, setGoals] = useState([]);
  const [selectedHabits, setSelectedHabits] = useState([]);

  const goalOptions = [
    {id:'health',emoji:'🏋️',text:'Get healthier'},
    {id:'learning',emoji:'📚',text:'Learn more'},
    {id:'mindfulness',emoji:'🧘',text:'Be more mindful'},
    {id:'fitness',emoji:'💪',text:'Build fitness'},
    {id:'productivity',emoji:'💰',text:'Be more productive'},
  ];

  const goalToTemplates = {
    health:['morning'], learning:['learning'], mindfulness:['mindfulness'],
    fitness:['fitness'], productivity:['productivity'], creativity:['learning'],
    sleep:['morning'], hydration:['morning']
  };

  const suggestedHabits = useMemo(() => {
    const templateKeys = new Set();
    goals.forEach(g => (goalToTemplates[g]||[]).forEach(t => templateKeys.add(t)));
    if (templateKeys.size === 0) templateKeys.add('morning');
    const habits = [];
    const seen = new Set();
    templateKeys.forEach(k => {
      (HABIT_TEMPLATES[k]?.habits || []).forEach(h => {
        if (!seen.has(h.name)) { seen.add(h.name); habits.push(h); }
      });
    });
    return habits;
  }, [goals]);

  useEffect(() => {
    if (step === 2) setSelectedHabits(suggestedHabits.map(h => h.name));
  }, [step, suggestedHabits]);

  const toggleGoal = (id) => {
    setGoals(prev => prev.includes(id) ? prev.filter(g => g !== id) : [...prev, id]);
  };

  const toggleHabit = (name) => {
    setSelectedHabits(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
  };

  const finish = () => {
    const habits = suggestedHabits
      .filter(h => selectedHabits.includes(h.name))
      .map((h, i) => ({
        id: genId(),
        name: h.name,
        emoji: h.emoji,
        description: '',
        category: h.category || 'health',
        color: getCategoryColor(h.category),
        frequency: { type: 'daily', days: [...DAY_KEYS], timesPerWeek: 7 },
        timeOfDay: i < 3 ? 'morning' : i < 5 ? 'afternoon' : 'evening',
        isQuantifiable: h.isQuantifiable || false,
        target: h.target || { value: 1, unit: 'times' },
        difficulty: h.difficulty || 'medium',
        xpReward: getXpReward(h.difficulty || 'medium'),
        streakFreezeEnabled: true,
        maxFreezes: 2,
        restDays: [],
        stackAfter: null,
        startDate: getToday(),
        endDate: null,
        archived: false,
        order: i,
        createdAt: new Date().toISOString()
      }));
    onComplete(habits);
  };

  const tourCards = [
    {emoji:'✅',title:'Tap to Complete',desc:'Check off habits as you do them throughout the day'},
    {emoji:'🔥',title:'Build Streaks',desc:"Don't break the chain — consistency is key"},
    {emoji:'📊',title:'Track Progress',desc:'See your stats, trends, and patterns over time'},
    {emoji:'🏆',title:'Earn Rewards',desc:'Level up, unlock badges, and complete challenges'}
  ];

  return (
    <div className="app-container" style={{background:'var(--bg-primary)'}}>
      {step === 0 && (
        <div className="onboard-screen fade-in">
          <div className="onboard-icon">🌊</div>
          <div className="onboard-title">Welcome to HabitFlow</div>
          <div className="onboard-subtitle">Build better habits, one day at a time</div>
          <button className="btn-primary" onClick={() => setStep(1)}>Get Started</button>
        </div>
      )}

      {step === 1 && (
        <div className="onboard-screen fade-in" style={{justifyContent:'flex-start',paddingTop:'calc(var(--safe-top) + 40px)'}}>
          <div style={{fontSize:'24px',fontWeight:700,marginBottom:8}}>What do you want to focus on?</div>
          <div style={{color:'var(--text-secondary)',marginBottom:24}}>Select all that apply</div>
          <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%',marginBottom:32}}>
            {goalOptions.map(g => (
              <div key={g.id} className={`goal-card ${goals.includes(g.id)?'selected':''}`}
                onClick={() => toggleGoal(g.id)}>
                <span className="goal-emoji">{g.emoji}</span>
                <span className="goal-text">{g.text}</span>
                {goals.includes(g.id) && <span style={{marginLeft:'auto',color:'var(--accent-light)'}}>✓</span>}
              </div>
            ))}
          </div>
          <button className="btn-primary" onClick={() => setStep(2)}
            disabled={goals.length === 0}
            style={{opacity: goals.length === 0 ? 0.5 : 1}}>
            Continue
          </button>
        </div>
      )}

      {step === 2 && (
        <div className="onboard-screen fade-in" style={{justifyContent:'flex-start',paddingTop:'calc(var(--safe-top) + 40px)'}}>
          <div style={{fontSize:'24px',fontWeight:700,marginBottom:8}}>Pick your starter habits</div>
          <div style={{color:'var(--text-secondary)',marginBottom:24}}>Toggle the ones you want</div>
          <div style={{display:'flex',flexDirection:'column',gap:8,width:'100%',marginBottom:32,flex:1,overflowY:'auto'}}>
            {suggestedHabits.map(h => (
              <div key={h.name} className={`goal-card ${selectedHabits.includes(h.name)?'selected':''}`}
                onClick={() => toggleHabit(h.name)}>
                <span style={{fontSize:'24px'}}>{h.emoji}</span>
                <span className="goal-text">{h.name}</span>
                <span style={{marginLeft:'auto',fontSize:'12px',color:'var(--text-muted)',textTransform:'capitalize'}}>{h.difficulty}</span>
                {selectedHabits.includes(h.name) && <span style={{color:'var(--accent-light)'}}>✓</span>}
              </div>
            ))}
          </div>
          <button className="btn-primary" onClick={() => setStep(3)}
            disabled={selectedHabits.length === 0}
            style={{opacity: selectedHabits.length === 0 ? 0.5 : 1}}>
            Start with {selectedHabits.length} habit{selectedHabits.length !== 1 ? 's' : ''}
          </button>
        </div>
      )}

      {step === 3 && (
        <div className="onboard-screen fade-in" style={{justifyContent:'flex-start',paddingTop:'calc(var(--safe-top) + 40px)'}}>
          <div style={{fontSize:'24px',fontWeight:700,marginBottom:24}}>Quick Tour</div>
          <div style={{display:'flex',flexDirection:'column',gap:16,width:'100%',marginBottom:32}}>
            {tourCards.map((c,i) => (
              <div key={i} className="card fade-in" style={{animationDelay:(i*0.1)+'s',display:'flex',alignItems:'center',gap:16}}>
                <span style={{fontSize:'36px'}}>{c.emoji}</span>
                <div>
                  <div style={{fontWeight:600,fontSize:'15px'}}>{c.title}</div>
                  <div style={{fontSize:'13px',color:'var(--text-secondary)',marginTop:2}}>{c.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <button className="btn-primary" onClick={finish}>Let's go!</button>
        </div>
      )}
    </div>
  );
}

                {DAY_NAMES[i].charAt(0)}

            ))}
          </div>
        </div>

        {/* Actions */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <button className="btn-primary" onClick={save}>{isEdit ? 'Save Changes' : 'Create Habit'}</button>
          {isEdit && !showDeleteConfirm && (
            <button className="btn-danger" style={{width:'100%'}} onClick={() => setShowDeleteConfirm(true)}>Delete Habit</button>
          )}
          {showDeleteConfirm && (
            <div style={{background:'rgba(239,68,68,0.1)',border:'1px solid var(--danger)',borderRadius:12,padding:16}}>
              <div style={{fontSize:'14px',fontWeight:600,color:'var(--danger)',marginBottom:8}}>Delete this habit?</div>

          )}
          <button style={{padding:'10px',color:'var(--text-muted)',fontSize:'14px'}} onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

   ================================================================= */

const TodayTab = memo(function TodayTab() {
  const app = useApp();
  const { habits, todayCompletions, streaks, gamification, completeHabit, skipHabit, setQtyValue,
    showToast, triggerConfetti } = app;
  const today = getToday();

  const scheduledHabits = useMemo(() =>
    habits.filter(h => !h.archived && isHabitScheduledOnDate(h, today))
      .sort((a,b) => a.order - b.order),
    [habits, today]
  );

  const completedCount = useMemo(() =>
    scheduledHabits.filter(h => todayCompletions[h.id]?.completed).length,
    [scheduledHabits, todayCompletions]
  );

  const progress = scheduledHabits.length ? Math.round((completedCount / scheduledHabits.length) * 100) : 0;
  const allDone = scheduledHabits.length > 0 && completedCount === scheduledHabits.length;

  const grouped = useMemo(() => {
    const groups = {morning:[],afternoon:[],evening:[]};
    scheduledHabits.forEach(h => {
      const tod = h.timeOfDay || 'morning';
      if (groups[tod]) groups[tod].push(h);
    });
    return groups;
  }, [scheduledHabits]);

  const [showSkipModal, setShowSkipModal] = useState(null);
  const [xpFloats, setXpFloats] = useState([]);

  const handleComplete = useCallback((habit) => {
    const isCompleted = todayCompletions[habit.id]?.completed;
    if (isCompleted) {
      completeHabit(habit.id, false);
    } else {
      completeHabit(habit.id, true);
      const xpAmount = getXpReward(habit.difficulty) + Math.min(streaks[habit.id]?.current || 0, 20);
      setXpFloats(prev => [...prev, {id: Date.now(), amount: xpAmount, habitId: habit.id}]);
      setTimeout(() => setXpFloats(prev => prev.filter(f => f.habitId !== habit.id)), 1200);
    }
  }, [todayCompletions, completeHabit, streaks]);

  const handleQtyTap = useCallback((habit) => {
    const current = todayCompletions[habit.id]?.value || 0;
    const newVal = current + 1;
    setQtyValue(habit.id, newVal);
    if (newVal >= habit.target.value && !todayCompletions[habit.id]?.completed) {
      completeHabit(habit.id, true, newVal);
    }
  }, [todayCompletions, setQtyValue, completeHabit]);

  const completeAllInGroup = useCallback((group) => {
    grouped[group].forEach(h => {
      if (!todayCompletions[h.id]?.completed) completeHabit(h.id, true);
    });
  }, [grouped, todayCompletions, completeHabit]);

  // Stats for quick stats bar
  const bestStreak = useMemo(() => {
    let best = 0;
    Object.values(streaks).forEach(s => { if (s.current > best) best = s.current; });
    return best;
  }, [streaks]);

  const levelInfo = useMemo(() => getLevelInfo(gamification?.xp || 0), [gamification]);

  return (
    <div style={{padding:'0 16px',paddingTop:'calc(var(--safe-top) + 16px)'}}>
      {/* Header */}
      <div className="fade-in" style={{marginBottom:20}}>
        <div style={{color:'var(--text-muted)',fontSize:'14px',marginBottom:4}}>{getGreeting()}</div>
        <div style={{fontSize:'22px',fontWeight:700}}>{formatDate(today)}</div>
      </div>

      {/* Progress Ring */}
      <div className="fade-in" style={{display:'flex',justifyContent:'center',marginBottom:20}}>
        <ProgressRing progress={progress} size={130} strokeWidth={10}>
          <div style={{fontSize:'28px',fontWeight:800}}>{progress}%</div>
          <div style={{fontSize:'12px',color:'var(--text-muted)'}}>{completedCount} of {scheduledHabits.length}</div>
        </ProgressRing>
      </div>

      {allDone && (
        <div className="scale-in" style={{textAlign:'center',padding:'12px',background:'var(--accent-dim)',
          borderRadius:12,marginBottom:16,border:'1px solid var(--accent)'}}>
          <div style={{fontSize:'24px'}}>🎉</div>
          <div style={{fontSize:'16px',fontWeight:700,color:'var(--accent-light)'}}>Perfect day! All habits done!</div>
        </div>
      )}

      {/* Quick Stats */}
      <div className="scroll-h" style={{marginBottom:20}}>
        <div className="stat-card">
          <div className="stat-value" style={{fontSize:'18px'}}>🔥 {bestStreak}</div>
          <div className="stat-label">Best Streak</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{fontSize:'18px'}}>⭐ Lv.{levelInfo.level}</div>
          <div className="stat-label">{levelInfo.name}</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{fontSize:'18px'}}>🏆 {(gamification?.badges || []).length}</div>
          <div className="stat-label">Badges</div>
        </div>
      </div>

      {/* Empty State */}
      {scheduledHabits.length === 0 && (
        <div style={{textAlign:'center',padding:'40px 20px'}} className="fade-in">
          <div style={{fontSize:'60px',marginBottom:16}}>🌊</div>
          <div style={{fontSize:'18px',fontWeight:700,marginBottom:8}}>
            {habits.length === 0 ? 'Start your journey' : 'Nothing scheduled today'}
          </div>
          <div style={{color:'var(--text-muted)',fontSize:'14px'}}>
            {habits.length === 0 ? 'Add your first habit to get started!' : 'Enjoy your rest! 😌'}
          </div>
        </div>
      )}

      {/* Habit Groups */}
      {['morning','afternoon','evening'].map(group => {
        const items = grouped[group] || [];
        if (items.length === 0) return null;
        const allGroupDone = items.every(h => todayCompletions[h.id]?.completed);
        const sortedItems = [...items].sort((a,b) => {
          const aDone = todayCompletions[a.id]?.completed ? 1 : 0;
          const bDone = todayCompletions[b.id]?.completed ? 1 : 0;
          return aDone - bDone;
        });

        return (
          <div key={group} style={{marginBottom:20}}>
            <div className="section-header">{getTimeOfDayLabel(group)}</div>
            {sortedItems.map(habit => {
              const comp = todayCompletions[habit.id];
              const done = comp?.completed;
              const skipped = comp?.skipped;
              const streak = streaks[habit.id]?.current || 0;
              const catColor = getCategoryColor(habit.category);
              const xpFloat = xpFloats.find(f => f.habitId === habit.id);

              return (
                <div key={habit.id}
                  className={`habit-card ${done ? 'completed' : ''} fade-in`}
                  style={{position:'relative'}}>
                  <div className="cat-bar" style={{background:catColor}} />

                  {/* Swipe hint areas */}
                  <div style={{position:'absolute',left:4,top:'50%',transform:'translateY(-50%)',fontSize:'10px',
                    color:'var(--text-muted)',opacity:0.4,display:done?'none':'block'}}>→</div>

                  <div className="habit-emoji">{habit.emoji}</div>
                  <div className="habit-info" onClick={() => {
                    if (habit.isQuantifiable && !done) {
                      handleQtyTap(habit);
                    } else {
                      handleComplete(habit);
                    }
                  }}>
                    <div className="habit-name" style={{textDecoration:done?'line-through':'none'}}>
                      {habit.name}
                    </div>
                    <div className="habit-meta">
                      {streak > 0 && <span className="streak-badge">🔥 {streak}</span>}
                      <span style={{textTransform:'capitalize'}}>{habit.category}</span>
                      {skipped && <span style={{color:'var(--warning)'}}>Skipped</span>}
                    </div>
                    {habit.isQuantifiable && (
                      <div>
                        <div style={{display:'flex',alignItems:'center',gap:4,fontSize:'12px',
                          color:'var(--text-secondary)',marginTop:4}}>
                          {comp?.value || 0}/{habit.target.value} {habit.target.unit}
                        </div>
                        <div className="qty-bar">
                          <div className="qty-bar-fill"
                            style={{width:Math.min(100, ((comp?.value||0)/habit.target.value)*100)+'%',
                              background:catColor}} />
                        </div>
                      </div>
                    )}
                  </div>

                  {xpFloat && (
                    <div className="xp-float">+{xpFloat.amount} XP</div>
                  )}

                  {!done && !skipped && (
                    <button style={{fontSize:'12px',color:'var(--text-muted)',padding:'4px 8px',borderRadius:6,
                      background:'var(--bg-tertiary)'}}
                      onClick={() => setShowSkipModal(habit)}>Skip</button>
                  )}

                  <div className={`check-circle ${done ? 'done' : ''}`}
                    style={done ? {background:catColor} : {}}
                    onClick={() => handleComplete(habit)}>
                    {done && (
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"
                        strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20 6 9 17 4 12"
                          strokeDasharray="50" strokeDashoffset="0" />
                      </svg>
                    )}
                  </div>
                </div>
              );
            })}

            {!allGroupDone && (
              <button onClick={() => completeAllInGroup(group)}
                style={{width:'100%',padding:'10px',color:'var(--accent-light)',fontSize:'13px',
                  fontWeight:600,borderRadius:10,background:'var(--accent-dim)',marginTop:4}}>
                Complete All {group.charAt(0).toUpperCase()+group.slice(1)}
              </button>
            )}
          </div>
        );
      })}

      {/* Skip Modal */}
      {showSkipModal && (
        <SkipModal habitName={showSkipModal.name}
          onSkip={(reason) => { skipHabit(showSkipModal.id, reason); setShowSkipModal(null); }}
          onClose={() => setShowSkipModal(null)} />
      )}

      <div style={{height:80}} />
    </div>
  );
});

/* =================================================================

   ================================================================= */

const CalendarTab = memo(function CalendarTab() {
  const app = useApp();
  const { habits, allCompletions, allMoods } = app;
  const [view, setView] = useState('heatmap');
  const [selectedDay, setSelectedDay] = useState(null);
  const [currentMonth, setCurrentMonth] = useState(() => {
    const d = new Date();
    return {year: d.getFullYear(), month: d.getMonth()};
  });
  const today = getToday();

  // Generate heatmap data for last 12 months
  const heatmapData = useMemo(() => {
    const weeks = [];
    const end = new Date();
    const start = new Date();
    start.setFullYear(start.getFullYear() - 1);
    start.setDate(start.getDate() - start.getDay()); // align to Sunday

    let current = new Date(start);
    let week = [];

    while (current <= end) {
      const dateStr = current.toISOString().split('T')[0];
      const monthKey = getMonthKey(dateStr);
      const dayComps = allCompletions[monthKey]?.[dateStr] || {};
      const scheduled = habits.filter(h => !h.archived && isHabitScheduledOnDate(h, dateStr));
      const completed = scheduled.filter(h => dayComps[h.id]?.completed);
      const pct = scheduled.length > 0 ? (completed.length / scheduled.length) * 100 : -1;

      week.push({ date: dateStr, pct, month: current.getMonth() });

      if (current.getDay() === 6 || current >= end) {
        weeks.push([...week]);
        week = [];
      }
      current.setDate(current.getDate() + 1);
    }
    return weeks;
  }, [habits, allCompletions]);

  const getHeatColor = (pct) => {
    if (pct < 0) return 'var(--bg-tertiary)';
    if (pct === 0) return '#1a1a2e';
    if (pct <= 25) return '#312e81';
    if (pct <= 50) return '#4338ca';
    if (pct <= 75) return '#6366f1';
    if (pct < 100) return '#818cf8';
    return '#a5b4fc';
  };

  // Monthly calendar
  const monthDays = useMemo(() => {
    const {year, month} = currentMonth;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const days = [];
    for (let i = 0; i < firstDay; i++) days.push(null);
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const monthKey = getMonthKey(dateStr);
      const dayComps = allCompletions[monthKey]?.[dateStr] || {};
      const scheduled = habits.filter(h => !h.archived && isHabitScheduledOnDate(h, dateStr));
      const completed = scheduled.filter(h => dayComps[h.id]?.completed);
      const pct = scheduled.length > 0 ? Math.round((completed.length / scheduled.length) * 100) : -1;
      days.push({date: dateStr, day: d, pct, isToday: dateStr === today});
    }
    return days;
  }, [currentMonth, habits, allCompletions, today]);

  // Monthly summary
  const monthlySummary = useMemo(() => {
    const {year, month} = currentMonth;
    const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;
    const comps = allCompletions[monthKey] || {};
    let totalScheduled = 0, totalCompleted = 0, bestPct = 0, worstPct = 100;
    let bestDay = '', worstDay = '';

    Object.keys(comps).forEach(dateStr => {
      const scheduled = habits.filter(h => !h.archived && isHabitScheduledOnDate(h, dateStr));
      const completed = scheduled.filter(h => comps[dateStr]?.[h.id]?.completed);
      if (scheduled.length > 0) {
        totalScheduled += scheduled.length;
        totalCompleted += completed.length;
        const pct = (completed.length / scheduled.length) * 100;
        if (pct >= bestPct) { bestPct = pct; bestDay = dateStr; }
        if (pct <= worstPct) { worstPct = pct; worstDay = dateStr; }
      }
    });

    return {
      pct: totalScheduled > 0 ? Math.round((totalCompleted / totalScheduled) * 100) : 0,
      totalCompleted,
      bestDay, worstDay
    };
  }, [currentMonth, habits, allCompletions]);

  const prevMonth = () => setCurrentMonth(({year, month}) =>
    month === 0 ? {year: year-1, month: 11} : {year, month: month-1});
  const nextMonth = () => setCurrentMonth(({year, month}) =>
    month === 11 ? {year: year+1, month: 0} : {year, month: month+1});

  const selectedMonthKey = `${currentMonth.year}-${String(currentMonth.month+1).padStart(2,'0')}`;
  const selectedCompletions = allCompletions[selectedMonthKey] || {};
  const selectedMoods = allMoods[selectedMonthKey] || {};

  return (
    <div style={{padding:'0 16px',paddingTop:'calc(var(--safe-top) + 16px)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:'22px',fontWeight:700}}>Calendar</div>
        <div style={{display:'flex',gap:8}}>
          <button className={`chip ${view==='heatmap'?'active':''}`} onClick={() => setView('heatmap')}>Heatmap</button>
          <button className={`chip ${view==='monthly'?'active':''}`} onClick={() => setView('monthly')}>Monthly</button>
        </div>
      </div>

      {/* Monthly Summary */}
      <div className="card fade-in" style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:'16px',fontWeight:700}}>
              {MONTH_NAMES[currentMonth.month]} {currentMonth.year}
            </div>
            <div style={{color:'var(--accent-light)',fontSize:'14px',fontWeight:600}}>
              {monthlySummary.pct}% consistent
            </div>
          </div>
          <div style={{fontSize:'13px',color:'var(--text-muted)',textAlign:'right'}}>
            <div>{monthlySummary.totalCompleted} completed</div>
          </div>
        </div>
      </div>

      {view === 'heatmap' ? (
        /* GitHub-style Heatmap */
        <div className="fade-in">
          <div style={{fontSize:'13px',color:'var(--text-muted)',marginBottom:8,display:'flex',gap:4}}>
            {['S','M','T','W','T','F','S'].map((d,i) => (
              <div key={i} style={{width:12,textAlign:'center',fontSize:'10px'}}>{i%2===0?d:''}</div>
            ))}
          </div>
          <div className="heatmap-grid">
            {heatmapData.map((week, wi) => (
              <div key={wi} className="heatmap-col">
                {week.map((day, di) => (
                  <div key={di} className="heatmap-cell"
                    style={{background: getHeatColor(day.pct),
                      border: day.date === today ? '1px solid var(--accent)' : 'none'}}
                    onClick={() => setSelectedDay(day.date)}
                    title={`${day.date}: ${day.pct >= 0 ? Math.round(day.pct)+'%' : 'No data'}`} />
                ))}
              </div>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:4,justifyContent:'flex-end',marginTop:8}}>
            <span style={{fontSize:'10px',color:'var(--text-muted)'}}>Less</span>
            {[0,25,50,75,100].map(p => (
              <div key={p} style={{width:12,height:12,borderRadius:2,background:getHeatColor(p)}} />
            ))}
            <span style={{fontSize:'10px',color:'var(--text-muted)'}}>More</span>
          </div>
        </div>
      ) : (
        /* Monthly Calendar */
        <div className="fade-in">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <button onClick={prevMonth} style={{fontSize:'20px',padding:'8px 12px'}}>‹</button>
            <div style={{fontSize:'16px',fontWeight:700}}>
              {MONTH_NAMES[currentMonth.month]} {currentMonth.year}
            </div>
            <button onClick={nextMonth} style={{fontSize:'20px',padding:'8px 12px'}}>›</button>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:8}}>
            {DAY_NAMES.map(d => (
              <div key={d} style={{textAlign:'center',fontSize:'11px',color:'var(--text-muted)',padding:4,fontWeight:600}}>{d}</div>
            ))}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
            {monthDays.map((d, i) => {
              if (!d) return <div key={`empty-${i}`} />;
              return (
                <button key={d.date} onClick={() => setSelectedDay(d.date)}
                  style={{
                    aspectRatio:'1',
                    borderRadius:10,
                    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                    background: d.isToday ? 'var(--accent-dim)' : 'var(--bg-secondary)',
                    border: d.isToday ? '1px solid var(--accent)' : '1px solid transparent',
                    position:'relative'
                  }}>
                  <span style={{fontSize:'13px',fontWeight:d.isToday?700:500}}>{d.day}</span>
                  {d.pct >= 0 && (
                    <div style={{
                      width:6,height:6,borderRadius:3,marginTop:2,
                      background: d.pct === 100 ? 'var(--success)' :
                                  d.pct >= 50 ? 'var(--accent)' :
                                  d.pct > 0 ? 'var(--warning)' : 'var(--danger)'
                    }} />
                  )}
                </button>
              );
            })}
          </div>

          <button onClick={() => {
            const d = new Date();
            setCurrentMonth({year: d.getFullYear(), month: d.getMonth()});
          }}
            style={{margin:'16px auto',display:'block',color:'var(--accent-light)',fontSize:'14px',fontWeight:600}}>
            Today
          </button>
        </div>
      )}

      {/* Day Detail Modal */}
      {selectedDay && (
        <DayDetailModal
          dateStr={selectedDay}
          habits={habits}
          completions={selectedCompletions}
          moodData={selectedMoods}
          onClose={() => setSelectedDay(null)}
        />
      )}

      <div style={{height:80}} />
    </div>
  );
});

/* =================================================================
   STATS TAB
   ================================================================= */

const StatsTab = memo(function StatsTab() {
  const app = useApp();
  const { habits, allCompletions, streaks, gamification, allMoods } = app;
  const [chartRange, setChartRange] = useState(30);
  const [expandedHabit, setExpandedHabit] = useState(null);
  const [statsSection, setStatsSection] = useState('overview');
  const today = getToday();

  // Completion trend data
  const trendData = useMemo(() => {
    const data = [];
    for (let i = chartRange - 1; i >= 0; i--) {
      const dateStr = addDays(today, -i);
      const monthKey = getMonthKey(dateStr);
      const dayComps = allCompletions[monthKey]?.[dateStr] || {};
      const scheduled = habits.filter(h => !h.archived && isHabitScheduledOnDate(h, dateStr));
      const completed = scheduled.filter(h => dayComps[h.id]?.completed);
      const pct = scheduled.length > 0 ? Math.round((completed.length / scheduled.length) * 100) : 0;
      data.push({
        date: dateStr,
        label: dateStr.substring(5),
        pct,
        completed: completed.length,
        total: scheduled.length
      });
    }
    return data;
  }, [habits, allCompletions, chartRange, today]);

  // Day of week performance
  const dowPerformance = useMemo(() => {
    const totals = Array(7).fill(0).map(() => ({scheduled:0, completed:0}));
    for (let i = 0; i < 90; i++) {
      const dateStr = addDays(today, -i);
      const dow = getDayOfWeek(dateStr);
      const monthKey = getMonthKey(dateStr);
      const dayComps = allCompletions[monthKey]?.[dateStr] || {};
      const scheduled = habits.filter(h => !h.archived && isHabitScheduledOnDate(h, dateStr));
      const completed = scheduled.filter(h => dayComps[h.id]?.completed);
      totals[dow].scheduled += scheduled.length;
      totals[dow].completed += completed.length;
    }
    return DAY_NAMES.map((name, i) => ({
      day: name,
      pct: totals[i].scheduled > 0 ? Math.round((totals[i].completed / totals[i].scheduled) * 100) : 0
    }));
  }, [habits, allCompletions, today]);

  // Lifetime stats
  const lifetimeStats = useMemo(() => {
    let totalCompleted = 0;
    let bestStreak = 0, bestStreakHabit = '';
    let longestEver = 0, longestEverHabit = '';

    Object.entries(streaks).forEach(([hid, s]) => {
      const habit = habits.find(h => h.id === hid);
      if (s.current > bestStreak) { bestStreak = s.current; bestStreakHabit = habit?.name || ''; }
      if (s.longest > longestEver) { longestEver = s.longest; longestEverHabit = habit?.name || ''; }
    });

    Object.values(allCompletions).forEach(monthData => {
      Object.values(monthData).forEach(dayData => {
        Object.values(dayData).forEach(comp => {
          if (comp.completed) totalCompleted++;
        });
      });
    });

    // Consistency score (last 30 days)
    let totalPct = 0, validDays = 0;
    for (let i = 0; i < 30; i++) {
      const dateStr = addDays(today, -i);
      const monthKey = getMonthKey(dateStr);
      const dayComps = allCompletions[monthKey]?.[dateStr] || {};
      const scheduled = habits.filter(h => !h.archived && isHabitScheduledOnDate(h, dateStr));
      const completed = scheduled.filter(h => dayComps[h.id]?.completed);
      if (scheduled.length > 0) {
        const weight = i < 7 ? 1.5 : 1;
        totalPct += (completed.length / scheduled.length) * weight;
        validDays += weight;
      }
    }
    const consistency = validDays > 0 ? Math.round((totalPct / validDays) * 100) : 0;

    return { totalCompleted, bestStreak, bestStreakHabit, longestEver, longestEverHabit, consistency };
  }, [habits, allCompletions, streaks, today]);

  // Per-habit stats
  const habitStats = useMemo(() => {
    return habits.filter(h => !h.archived).map(h => {
      const streak = streaks[h.id] || {current:0,longest:0};
      let totalDone = 0, scheduled30 = 0, completed30 = 0;
      const sparkline = [];

      for (let i = 29; i >= 0; i--) {
        const dateStr = addDays(today, -i);
        const monthKey = getMonthKey(dateStr);
        const comp = allCompletions[monthKey]?.[dateStr]?.[h.id];
        const isScheduled = isHabitScheduledOnDate(h, dateStr);
        if (isScheduled) {
          scheduled30++;
          if (comp?.completed) { completed30++; totalDone++; }
        }
        sparkline.push({day:30-i, done:comp?.completed?1:0});
      }

      // Count older completions
      Object.values(allCompletions).forEach(monthData => {
        Object.values(monthData).forEach(dayData => {
          if (dayData[h.id]?.completed) totalDone++;
        });
      });

      const rate = scheduled30 > 0 ? Math.round((completed30/scheduled30)*100) : 0;
      return { ...h, streak, totalDone, rate, sparkline };
    }).sort((a,b) => b.rate - a.rate);
  }, [habits, allCompletions, streaks, today]);

  // Correlations
  const correlations = useMemo(() => {
    const activeHabits = habits.filter(h => !h.archived);
    const results = [];
    if (activeHabits.length < 2) return results;

    for (let i = 0; i < activeHabits.length && i < 5; i++) {
      for (let j = i + 1; j < activeHabits.length && j < 5; j++) {
        const a = activeHabits[i], b = activeHabits[j];
        let bothScheduled = 0, aAndB = 0, notAAndB = 0, aNotB = 0;

        for (let d = 0; d < 60; d++) {
          const dateStr = addDays(today, -d);
          const mk = getMonthKey(dateStr);
          const dayComps = allCompletions[mk]?.[dateStr] || {};
          const aScheduled = isHabitScheduledOnDate(a, dateStr);
          const bScheduled = isHabitScheduledOnDate(b, dateStr);
          if (aScheduled && bScheduled) {
            bothScheduled++;
            const aDone = dayComps[a.id]?.completed;
            const bDone = dayComps[b.id]?.completed;
            if (aDone && bDone) aAndB++;
            if (!aDone && bDone) notAAndB++;
            if (aDone && !bDone) aNotB++;
          }
        }
        if (bothScheduled >= 10) {
          const aDoneCount = aAndB + aNotB;
          const aNotDoneCount = bothScheduled - aDoneCount;
          const rateWithA = aDoneCount > 0 ? (aAndB / aDoneCount) * 100 : 0;
          const rateWithoutA = aNotDoneCount > 0 ? (notAAndB / aNotDoneCount) * 100 : 0;
          const diff = Math.round(rateWithA - rateWithoutA);
          if (Math.abs(diff) > 20) {
            results.push({
              habitA: a.name, emojiA: a.emoji,
              habitB: b.name, emojiB: b.emoji,
              diff, positive: diff > 0
            });
          }
        }
      }
    }
    return results.slice(0, 5);
  }, [habits, allCompletions, today]);

  // Mood trend
  const moodTrend = useMemo(() => {
    const data = [];
    for (let i = 29; i >= 0; i--) {
      const dateStr = addDays(today, -i);
      const mk = getMonthKey(dateStr);
      const mood = allMoods[mk]?.[dateStr];
      if (mood) {
        data.push({date: dateStr.substring(5), mood: mood.mood, energy: mood.energy || 0});
      }
    }
    return data;
  }, [allMoods, today]);

  const levelInfo = getLevelInfo(gamification?.xp || 0);
  const badges = gamification?.badges || [];

  const sectionBtns = [
    {id:'overview',label:'Overview'},
    {id:'habits',label:'Habits'},
    {id:'gamification',label:'Rewards'},
    {id:'mood',label:'Mood'}
  ];

  return (
    <div style={{padding:'0 16px',paddingTop:'calc(var(--safe-top) + 16px)'}}>
      <div style={{fontSize:'22px',fontWeight:700,marginBottom:16}}>Statistics</div>

      {/* Section Tabs */}
      <div className="scroll-h" style={{marginBottom:20}}>
        {sectionBtns.map(s => (
          <button key={s.id} className={`chip ${statsSection===s.id?'active':''}`}
            onClick={() => setStatsSection(s.id)}>{s.label}</button>
        ))}
      </div>

      {/* OVERVIEW SECTION */}
      {statsSection === 'overview' && (
        <div className="fade-in">
          {/* Overview Cards */}
          <div className="scroll-h" style={{marginBottom:20}}>
            <div className="stat-card">
              <div className="stat-value">{lifetimeStats.totalCompleted}</div>
              <div className="stat-label">Total Completed</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">🔥 {lifetimeStats.bestStreak}</div>
              <div className="stat-label">Current Best</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">💎 {lifetimeStats.longestEver}</div>
              <div className="stat-label">Longest Ever</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">{lifetimeStats.consistency}</div>
              <div className="stat-label">Consistency Score</div>
            </div>
          </div>

          {/* Completion Trend Chart */}
          <div className="card" style={{marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontSize:'15px',fontWeight:600}}>Completion Rate</div>
              <div style={{display:'flex',gap:4}}>
                {[7,30,90].map(r => (
                  <button key={r} className={`chip ${chartRange===r?'active':''}`}
                    onClick={() => setChartRange(r)} style={{padding:'3px 8px',fontSize:'11px'}}>{r}d</button>
                ))}
              </div>
            </div>
            <div style={{width:'100%',height:180}}>
              <ResponsiveContainer>
                <AreaChart data={trendData} margin={{top:5,right:5,left:-20,bottom:0}}>
                  <defs>
                    <linearGradient id="colorPct" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%" stopColor="#6366f1" stopOpacity={0.3}/>
                      <stop offset="95%" stopColor="#6366f1" stopOpacity={0}/>
                    </linearGradient>
                  </defs>
                  <XAxis dataKey="label" tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false}
                    interval={Math.floor(trendData.length/5)} />
                  <YAxis tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false}
                    domain={[0,100]} />
                  <Tooltip contentStyle={{background:'#1e293b',border:'1px solid #334155',borderRadius:8,fontSize:12}}
                    labelStyle={{color:'#94a3b8'}} />
                  <Area type="monotone" dataKey="pct" stroke="#6366f1" strokeWidth={2}
                    fill="url(#colorPct)" dot={false} name="Completion %" />
                </AreaChart>
              </ResponsiveContainer>
            </div>
          </div>

          {/* Day of Week */}
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontSize:'15px',fontWeight:600,marginBottom:12}}>Day of Week Performance</div>
            <div style={{width:'100%',height:180}}>
              <ResponsiveContainer>
                <BarChart data={dowPerformance} margin={{top:5,right:5,left:-20,bottom:0}}>
                  <XAxis dataKey="day" tick={{fill:'#64748b',fontSize:11}} axisLine={false} tickLine={false} />
                  <YAxis tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false} domain={[0,100]} />
                  <Tooltip contentStyle={{background:'#1e293b',border:'1px solid #334155',borderRadius:8,fontSize:12}} />
                  <Bar dataKey="pct" radius={[6,6,0,0]} name="Completion %">
                    {dowPerformance.map((entry, i) => (
                      <Cell key={i} fill={entry.pct >= 80 ? '#22c55e' : entry.pct >= 50 ? '#6366f1' : '#ef4444'} />
                    ))}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
            {(() => {
              const best = dowPerformance.reduce((a,b) => a.pct > b.pct ? a : b, dowPerformance[0]);
              const worst = dowPerformance.reduce((a,b) => a.pct < b.pct ? a : b, dowPerformance[0]);
              return (
                <div style={{fontSize:'12px',color:'var(--text-muted)',marginTop:8}}>
                  Strongest: {best.day} ({best.pct}%) · Weakest: {worst.day} ({worst.pct}%)
                </div>
              );
            })()}
          </div>

          {/* Correlations */}
          {correlations.length > 0 && (
            <div style={{marginBottom:16}}>
              <div className="section-header">Insights</div>
              {correlations.map((c, i) => (
                <div key={i} className="card" style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:'20px'}}>{c.emojiA}</span>
                  <div style={{flex:1,fontSize:'13px'}}>
                    You complete <b>{c.habitB}</b> {Math.abs(c.diff)}% {c.positive ? 'more' : 'less'} on days you complete <b>{c.habitA}</b>
                  </div>
                  <span style={{fontSize:'20px'}}>{c.emojiB}</span>
                </div>
              ))}
            </div>
          )}

          {/* Personal Records */}
          <div className="card">
            <div style={{fontSize:'15px',fontWeight:600,marginBottom:12}}>Personal Records</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'13px'}}>
                <span>🏆 Longest streak ever</span>
                <span style={{fontWeight:600}}>{lifetimeStats.longestEver} days {lifetimeStats.longestEverHabit ? `(${lifetimeStats.longestEverHabit})` : ''}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'13px'}}>
                <span>✅ Total completions</span>
                <span style={{fontWeight:600}}>{lifetimeStats.totalCompleted}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'13px'}}>
                <span>📊 Consistency</span>
                <span style={{fontWeight:600}}>{lifetimeStats.consistency}%</span>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* HABITS SECTION */}
      {statsSection === 'habits' && (
        <div className="fade-in">
          {habitStats.map(h => (
            <div key={h.id}>
              <div className="card" onClick={() => setExpandedHabit(expandedHabit === h.id ? null : h.id)}
                style={{cursor:'pointer'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:'24px'}}>{h.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'14px',fontWeight:600}}>{h.name}</div>
                    <div style={{display:'flex',gap:12,fontSize:'12px',color:'var(--text-muted)',marginTop:2}}>
                      <span>🔥 {h.streak.current}</span>
                      <span>💎 {h.streak.longest}</span>
                      <span>{h.rate}%</span>
                    </div>
                  </div>
                  {/* Mini sparkline */}
                  <div style={{width:60,height:24}}>
                    <ResponsiveContainer>
                      <AreaChart data={h.sparkline} margin={{top:0,right:0,left:0,bottom:0}}>
                        <Area type="monotone" dataKey="done" stroke={getCategoryColor(h.category)}
                          fill={getCategoryColor(h.category)} fillOpacity={0.3} strokeWidth={1.5} dot={false} />
                      </AreaChart>
                    </ResponsiveContainer>
                  </div>
                  <span style={{fontSize:'16px',color:'var(--text-muted)'}}>{expandedHabit===h.id?'▼':'▶'}</span>
                </div>
              </div>

              {expandedHabit === h.id && (
                <div className="card fade-in" style={{marginTop:-4,borderTopLeftRadius:0,borderTopRightRadius:0}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                    <div><span style={{fontSize:'12px',color:'var(--text-muted)'}}>Current Streak</span>
                      <div style={{fontSize:'18px',fontWeight:700}}>🔥 {h.streak.current}</div></div>
                    <div><span style={{fontSize:'12px',color:'var(--text-muted)'}}>Longest Streak</span>
                      <div style={{fontSize:'18px',fontWeight:700}}>💎 {h.streak.longest}</div></div>
                    <div><span style={{fontSize:'12px',color:'var(--text-muted)'}}>Completion Rate</span>
                      <div style={{fontSize:'18px',fontWeight:700}}>{h.rate}%</div></div>
                    <div><span style={{fontSize:'12px',color:'var(--text-muted)'}}>Total Done</span>
                      <div style={{fontSize:'18px',fontWeight:700}}>{h.totalDone}</div></div>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* GAMIFICATION SECTION */}
      {statsSection === 'gamification' && (
        <div className="fade-in">
          {/* Level & XP */}
          <div className="card" style={{marginBottom:16,textAlign:'center'}}>
            <div style={{fontSize:'48px',marginBottom:8}}>{levelInfo.icon}</div>
            <div style={{fontSize:'20px',fontWeight:700}}>Level {levelInfo.level}: {levelInfo.name}</div>
            <div style={{fontSize:'14px',color:'var(--text-muted)',marginBottom:12}}>
              {gamification?.xp || 0} XP Total
            </div>
            {levelInfo.next && (
              <>

                <div style={{fontSize:'14px',fontWeight:600}}>Don't miss a single habit this week</div>

const SettingsTab = memo(function SettingsTab() {
  const app = useApp();
  const { habits, settings, updateSettings, saveHabit, deleteHabit, showToast, loadAllData } = app;
  const [editingHabit, setEditingHabit] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const [showArchived, setShowArchived] = useState(false);
  const [showClearConfirm, setShowClearConfirm] = useState(false);
  const [deleteText, setDeleteText] = useState('');
  const [showTemplates, setShowTemplates] = useState(false);
  const [settingsSection, setSettingsSection] = useState('habits');

  const activeHabits = habits.filter(h => !h.archived);
  const archivedHabits = habits.filter(h => h.archived);

  const handleSaveHabit = async (habitData) => {
    await saveHabit(habitData);
    setEditingHabit(null);
    setShowAddModal(false);
    showToast('Habit saved!', '✅');
  };

  const handleDeleteHabit = async (id) => {
    await deleteHabit(id);
    setEditingHabit(null);
    showToast('Habit deleted', '🗑️');
  };

  const handleArchive = async (habit) => {
    await saveHabit({...habit, archived: !habit.archived});
    showToast(habit.archived ? 'Habit restored!' : 'Habit archived', habit.archived ? '✅' : '📦');
  };

  const handleClearData = async () => {
    if (deleteText !== 'DELETE') return;
    await Storage.clearAll();
    setShowClearConfirm(false);
    setDeleteText('');
    window.location.reload();
  };

  const handleExport = async () => {
    const data = {};
    const keys = await Storage.list();
    for (const key of keys) {
      data[key] = await Storage.get(key);
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'habitflow-backup.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Data exported!', '📥');
  };

  const handleImport = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        for (const [key, value] of Object.entries(data)) {
          await Storage.set(key, value);
        }
        showToast('Data imported! Reloading...', '📤');
        setTimeout(() => window.location.reload(), 1500);
      } catch(err) {
        showToast('Import failed: invalid file', '❌');
      }
    };
    input.click();
  };

  const handleGenerateDemo = async () => {
    const demoHabits = [
      {name:'Meditate',emoji:'🧘',category:'mindfulness',difficulty:'medium',timeOfDay:'morning'},
      {name:'Exercise',emoji:'🏋️',category:'fitness',difficulty:'hard',timeOfDay:'morning'},
      {name:'Read',emoji:'📚',category:'learning',difficulty:'medium',timeOfDay:'evening'},
      {name:'Drink Water',emoji:'💧',category:'health',difficulty:'easy',timeOfDay:'morning',isQuantifiable:true,target:{value:8,unit:'glasses'}},
      {name:'Journal',emoji:'✍️',category:'mindfulness',difficulty:'easy',timeOfDay:'evening'},
      {name:'No Social Media',emoji:'📱',category:'productivity',difficulty:'hard',timeOfDay:'morning'},
    ];

    const newHabits = demoHabits.map((h, i) => ({
      id: genId(),
      name: h.name, emoji: h.emoji, description: '',
      category: h.category, color: getCategoryColor(h.category),
      frequency: {type:'daily',days:[...DAY_KEYS],timesPerWeek:7},
      timeOfDay: h.timeOfDay,
      isQuantifiable: h.isQuantifiable || false,
      target: h.target || {value:1,unit:'times'},
      difficulty: h.difficulty, xpReward: getXpReward(h.difficulty),
      streakFreezeEnabled: true, maxFreezes: 2, restDays: [],
      stackAfter: null, startDate: addDays(getToday(), -60), endDate: null,
      archived: false, order: i, createdAt: new Date().toISOString()
    }));

    await Storage.set('habits', newHabits);

    // Generate 60 days of completions
    for (let d = 60; d >= 0; d--) {
      const dateStr = addDays(getToday(), -d);
      const mk = getMonthKey(dateStr);
      let monthData = await Storage.get(`completions:${mk}`) || {};
      const dayData = {};
      newHabits.forEach(h => {
        if (Math.random() > 0.2) {
          dayData[h.id] = {
            completed: true,
            value: h.isQuantifiable ? h.target.value : 1,
            timestamp: new Date().toISOString()
          };
        }
      });
      monthData[dateStr] = dayData;
      await Storage.set(`completions:${mk}`, monthData);
    }

    // Generate mood data
    for (let d = 30; d >= 0; d--) {
      const dateStr = addDays(getToday(), -d);
      const mk = getMonthKey(dateStr);
      let moodMonth = await Storage.get(`mood:${mk}`) || {};
      moodMonth[dateStr] = {
        mood: Math.floor(Math.random() * 3) + 3,
        energy: Math.floor(Math.random() * 3) + 3,
        tags: [], note: '', timestamp: new Date().toISOString()
      };
      await Storage.set(`mood:${mk}`, moodMonth);
    }

    await Storage.set('gamification', {xp: 1250, level: 5, badges: [
      {id:'first_step',unlockedAt:new Date().toISOString()},
      {id:'perfect_day',unlockedAt:new Date().toISOString()},
      {id:'on_fire',unlockedAt:new Date().toISOString()}
    ], challenges: {}});

    showToast('Demo data generated! Reloading...', '🎮');
    setTimeout(() => window.location.reload(), 1500);
  };

  const addFromTemplate = async (templateKey) => {
    const template = HABIT_TEMPLATES[templateKey];
    if (!template) return;
    const newHabits = template.habits.map((h, i) => ({
      id: genId(), name: h.name, emoji: h.emoji, description: '',
      category: h.category, color: getCategoryColor(h.category),
      frequency: {type:'daily',days:[...DAY_KEYS],timesPerWeek:7},
      timeOfDay: i < 3 ? 'morning' : i < 5 ? 'afternoon' : 'evening',
      isQuantifiable: h.isQuantifiable || false, target: h.target || {value:1,unit:'times'},
      difficulty: h.difficulty, xpReward: getXpReward(h.difficulty),
      streakFreezeEnabled: true, maxFreezes: 2, restDays: [],
      stackAfter: null, startDate: getToday(), endDate: null,
      archived: false, order: habits.length + i, createdAt: new Date().toISOString()
    }));

    for (const h of newHabits) await saveHabit(h);
    setShowTemplates(false);
    showToast(`Added ${newHabits.length} habits from ${template.name}`, '✅');
  };

  const sectionBtns = [
    {id:'habits',label:'Habits'},
    {id:'templates',label:'Templates'},
    {id:'appearance',label:'Settings'},
    {id:'data',label:'Data'},
    {id:'about',label:'About'}
  ];

  return (
    <div style={{padding:'0 16px',paddingTop:'calc(var(--safe-top) + 16px)'}}>
      <div style={{fontSize:'22px',fontWeight:700,marginBottom:16}}>Settings</div>

      <div className="scroll-h" style={{marginBottom:20}}>
        {sectionBtns.map(s => (
          <button key={s.id} className={`chip ${settingsSection===s.id?'active':''}`}
            onClick={() => setSettingsSection(s.id)}>{s.label}</button>
        ))}
      </div>

      {/* HABITS MANAGEMENT */}
      {settingsSection === 'habits' && (
        <div className="fade-in">
          <button className="btn-primary" style={{marginBottom:16}} onClick={() => setShowAddModal(true)}>
            + Add New Habit
          </button>

          <div className="section-header">Active Habits ({activeHabits.length})</div>
          {activeHabits.map(h => (
            <div key={h.id} className="card" style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:'24px'}}>{h.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:'14px',fontWeight:600}}>{h.name}</div>
                <div style={{fontSize:'12px',color:'var(--text-muted)',textTransform:'capitalize'}}>{h.category}</div>
              </div>
              <button onClick={() => setEditingHabit(h)}
                style={{padding:'6px 12px',borderRadius:8,background:'var(--bg-tertiary)',fontSize:'12px',color:'var(--text-secondary)'}}>Edit</button>
              <button onClick={() => handleArchive(h)}
                style={{padding:'6px 12px',borderRadius:8,background:'var(--bg-tertiary)',fontSize:'12px',color:'var(--warning)'}}>Archive</button>
            </div>
          ))}

          {archivedHabits.length > 0 && (
            <>
              <button onClick={() => setShowArchived(!showArchived)}
                style={{padding:'12px 0',color:'var(--text-muted)',fontSize:'14px',width:'100%',textAlign:'left'}}>
                {showArchived ? '▼' : '▶'} Archived ({archivedHabits.length})
              </button>
              {showArchived && archivedHabits.map(h => (
                <div key={h.id} className="card" style={{display:'flex',alignItems:'center',gap:10,opacity:0.6}}>
                  <span style={{fontSize:'24px'}}>{h.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'14px',fontWeight:600}}>{h.name}</div>
                  </div>
                  <button onClick={() => handleArchive(h)}
                    style={{padding:'6px 12px',borderRadius:8,background:'var(--bg-tertiary)',fontSize:'12px',color:'var(--success)'}}>Restore</button>
                  <button onClick={() => handleDeleteHabit(h.id)}
                    style={{padding:'6px 12px',borderRadius:8,background:'var(--bg-tertiary)',fontSize:'12px',color:'var(--danger)'}}>Delete</button>
                </div>
              ))}
            </>
          )}
        </div>

      {/* TEMPLATES */}
      {settingsSection === 'templates' && (
        <div className="fade-in">
          <div style={{fontSize:'14px',color:'var(--text-muted)',marginBottom:16}}>Quick-start habit packs</div>
          {Object.entries(HABIT_TEMPLATES).map(([key, template]) => (

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>

                <button className="chip active" onClick={() => addFromTemplate(key)}>Add All</button>
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>

                  <span key={h.name} className="chip" style={{fontSize:'12px'}}>{h.emoji} {h.name}</span>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* APP SETTINGS */}
      {settingsSection === 'appearance' && (
        <div className="fade-in">
          <div className="section-header">General</div>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0'}}>

                <div style={{fontSize:'14px',fontWeight:600}}>Mood Tracking</div>

});
