function App() {
  const [loading, setLoading] = useState(true);
  const [showOnboarding, setShowOnboarding] = useState(false);
  const [activeTab, setActiveTab] = useState('today');
  const [habits, setHabits] = useState([]);
  const [todayCompletions, setTodayCompletions] = useState({});
  const [allCompletions, setAllCompletions] = useState({});
  const [allMoods, setAllMoods] = useState({});
  const [streaks, setStreaks] = useState({});
  const [gamification, setGamification] = useState({xp:0,level:1,badges:[],challenges:{}});
  const [settings, setSettings] = useState({moodEnabled:true,weekStart:'Monday'});
  const [toasts, setToasts] = useState([]);
  const [showConfetti, setShowConfetti] = useState(false);
  const [showMoodModal, setShowMoodModal] = useState(false);
  const [showAddHabit, setShowAddHabit] = useState(false);
  const [todayStr, setTodayStr] = useState(getToday());

  const debounceTimers = useRef({});

  // Debounced storage write
  const debouncedSet = useCallback((key, value, delay = 500) => {
    if (debounceTimers.current[key]) clearTimeout(debounceTimers.current[key]);
    debounceTimers.current[key] = setTimeout(() => {
      Storage.set(key, value);
    }, delay);
  }, []);

  const showToast = useCallback((message, icon, undoAction, duration) => {
    const id = ++toastIdCounter;
    setToasts(prev => [...prev.slice(-2), {id, message, icon, undoAction, duration: duration || 3000}]);
  }, []);

  const removeToast = useCallback((id) => {
    setToasts(prev => prev.filter(t => t.id !== id));
  }, []);

  const triggerConfetti = useCallback(() => {
    setShowConfetti(true);
  }, []);

  // Load all data
  const loadAllData = useCallback(async () => {
    try {
      const onboarding = await Storage.get('onboarding');
      if (!onboarding?.completed) {
        setShowOnboarding(true);
        setLoading(false);
        return;
      }

      const [h, s, g, st] = await Promise.all([
        Storage.get('habits'),
        Storage.get('settings'),
        Storage.get('gamification'),
        Storage.get('streaks')
      ]);

      setHabits(h || []);
      setSettings(s || {moodEnabled:true,weekStart:'Monday'});
      setGamification(g || {xp:0,level:1,badges:[],challenges:{}});
      setStreaks(st || {});

      // Load completions for current and last 12 months
      const today = getToday();
      const comps = {};
      const moods = {};
      const now = new Date();
      for (let i = 0; i < 13; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        const [c, m] = await Promise.all([
          Storage.get(`completions:${mk}`),
          Storage.get(`mood:${mk}`)
        ]);
        if (c) comps[mk] = c;
        if (m) moods[mk] = m;
      }
      setAllCompletions(comps);
      setAllMoods(moods);

      const todayMk = getMonthKey(today);
      setTodayCompletions(comps[todayMk]?.[today] || {});

      // Check if mood check-in needed
      if ((s || settings).moodEnabled !== false) {
        const todayMood = moods[todayMk]?.[today];
        if (!todayMood && (h || []).length > 0) {
          setTimeout(() => setShowMoodModal(true), 2000);
        }
      }

      setLoading(false);
    } catch(e) {
      console.error('Load error:', e);
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadAllData(); }, [loadAllData]);

  // Check for day change
  useEffect(() => {
    const interval = setInterval(() => {
      const newToday = getToday();
      if (newToday !== todayStr) {
        setTodayStr(newToday);
        loadAllData();
      }
    }, 60000);
    return () => clearInterval(interval);
  }, [todayStr, loadAllData]);

  // Calculate streaks for all habits
  const recalcStreaks = useCallback(async (habitsArr, completionsData) => {
    const newStreaks = {};
    const today = getToday();

    for (const habit of habitsArr) {
      if (habit.archived) continue;
      let current = 0;
      let checking = true;
      let day = today;
      let freezesUsed = 0;

      while (checking) {
        const mk = getMonthKey(day);
        const dayComps = completionsData[mk]?.[day];
        const isScheduled = isHabitScheduledOnDate(habit, day);

        if (!isScheduled) {
          // Not scheduled, skip this day
        } else if (dayComps?.[habit.id]?.completed) {
          current++;
        } else if (habit.streakFreezeEnabled && freezesUsed < (habit.maxFreezes || 2) && day !== today) {
          freezesUsed++;
          current++;
        } else if (day === today) {
          // Today hasn't been completed yet, don't break streak
        } else {
          checking = false;
        }

        day = addDays(day, -1);
        if (daysBetween(day, today) > 400) checking = false;
      }

      const prev = streaks[habit.id] || {current:0, longest:0, freezesUsed:0};
      newStreaks[habit.id] = {
        current,
        longest: Math.max(current, prev.longest),
        freezesUsed
      };
    }

    setStreaks(newStreaks);
    debouncedSet('streaks', newStreaks);
    return newStreaks;
  }, [streaks, debouncedSet]);

  // Complete habit
  const completeHabit = useCallback(async (habitId, completed, value) => {
    const today = getToday();
    const mk = getMonthKey(today);

    setTodayCompletions(prev => {
      const next = {...prev};
      if (completed) {
        next[habitId] = {
          ...(next[habitId] || {}),
          completed: true,
          value: value || (next[habitId]?.value || 1),
          timestamp: new Date().toISOString(),
          skipped: false
        };
      } else {
        next[habitId] = {...(next[habitId] || {}), completed: false};
      }

      // Persist
      setAllCompletions(ac => {
        const newAc = {...ac};
        if (!newAc[mk]) newAc[mk] = {};
        newAc[mk] = {...newAc[mk], [today]: next};
        debouncedSet(`completions:${mk}`, newAc[mk]);
        // Recalc streaks
        setTimeout(() => recalcStreaks(habits, newAc), 100);
        return newAc;
      });

      return next;
    });

    if (completed) {
      const habit = habits.find(h => h.id === habitId);
      if (habit) {
        // Award XP
        const streak = streaks[habitId]?.current || 0;
        const baseXP = getXpReward(habit.difficulty);
        const streakBonus = Math.min(streak, 20);
        let xpGain = baseXP + streakBonus;

        setGamification(prev => {
          const newG = {...prev, xp: (prev.xp || 0) + xpGain};
          newG.level = getLevelInfo(newG.xp).level;

          // Check badges
          const badges = [...(newG.badges || [])];
          const hasBadge = (id) => badges.some(b => b.id === id);

          if (!hasBadge('first_step')) {
            badges.push({id:'first_step',unlockedAt:new Date().toISOString()});
            showToast('Badge unlocked: First Step! 🌱', '🏆');
            triggerConfetti();
          }

          // Check streak-based badges
          const newStreak = (streaks[habitId]?.current || 0) + 1;
          if (newStreak >= 7 && !hasBadge('on_fire')) {
            badges.push({id:'on_fire',unlockedAt:new Date().toISOString()});
            showToast('Badge unlocked: On Fire! 🔥', '🏆');
            triggerConfetti();
          }
          if (newStreak >= 30 && !hasBadge('iron_streak')) {
            badges.push({id:'iron_streak',unlockedAt:new Date().toISOString()});
            showToast('Badge unlocked: Iron Streak! 💪', '🏆');
            triggerConfetti();
          }
          if (newStreak >= 100 && !hasBadge('diamond_streak')) {
            badges.push({id:'diamond_streak',unlockedAt:new Date().toISOString()});
            showToast('Badge unlocked: Diamond Streak! 💎', '🏆');
            triggerConfetti();
          }

          // Check category badges
          if (habit.category === 'mindfulness' && newStreak >= 50 && !hasBadge('zen_master')) {
            badges.push({id:'zen_master',unlockedAt:new Date().toISOString()});
            showToast('Badge unlocked: Zen Master! 🧘', '🏆');
          }
          if (habit.category === 'learning' && newStreak >= 50 && !hasBadge('bookworm')) {
            badges.push({id:'bookworm',unlockedAt:new Date().toISOString()});
            showToast('Badge unlocked: Bookworm! 📖', '🏆');
          }
          if (habit.category === 'fitness' && newStreak >= 50 && !hasBadge('athlete')) {
            badges.push({id:'athlete',unlockedAt:new Date().toISOString()});
            showToast('Badge unlocked: Athlete! 🏃', '🏆');
          }

          // Habit collector
          if (habits.filter(h => !h.archived).length >= 10 && !hasBadge('habit_collector')) {
            badges.push({id:'habit_collector',unlockedAt:new Date().toISOString()});
            showToast('Badge unlocked: Habit Collector! 📚', '🏆');
          }

          newG.badges = badges;
          debouncedSet('gamification', newG);
          return newG;
        });

        // Check for perfect day
        setTimeout(() => {
          setTodayCompletions(tc => {
            const scheduled = habits.filter(h => !h.archived && isHabitScheduledOnDate(h, today));
            const allDone = scheduled.length > 0 && scheduled.every(h => tc[h.id]?.completed);
            if (allDone) {
              triggerConfetti();
              showToast('Perfect day! +25 XP 🎉', '🎉');
              setGamification(prev => {
                const newG = {...prev, xp: prev.xp + 25};
                const badges = [...(newG.badges || [])];
                if (!badges.some(b => b.id === 'perfect_day')) {
                  badges.push({id:'perfect_day',unlockedAt:new Date().toISOString()});
                  showToast('Badge unlocked: Perfect Day! ✅', '🏆');
                }
                newG.badges = badges;
                newG.level = getLevelInfo(newG.xp).level;
                debouncedSet('gamification', newG);
                return newG;
              });
            }
            return tc;
          });
        }, 300);
      }

      showToast('Habit completed!', '✅');
    }
  }, [habits, streaks, debouncedSet, showToast, triggerConfetti, recalcStreaks]);

  // Skip habit
  const skipHabit = useCallback(async (habitId, reason) => {
    const today = getToday();
    const mk = getMonthKey(today);

    setTodayCompletions(prev => {
      const next = {...prev};
      next[habitId] = {...(next[habitId]||{}), skipped: true, skipReason: reason, completed: false};

      setAllCompletions(ac => {
        const newAc = {...ac};
        if (!newAc[mk]) newAc[mk] = {};
        newAc[mk] = {...newAc[mk], [today]: next};
        debouncedSet(`completions:${mk}`, newAc[mk]);
        return newAc;
      });

      return next;
    });

    showToast(`Skipped: ${reason}`, '⏭️');
  }, [debouncedSet, showToast]);

  // Set quantity value
  const setQtyValue = useCallback(async (habitId, value) => {
    const today = getToday();
    const mk = getMonthKey(today);

    setTodayCompletions(prev => {
      const next = {...prev};
      next[habitId] = {...(next[habitId]||{}), value};

      setAllCompletions(ac => {
        const newAc = {...ac};
        if (!newAc[mk]) newAc[mk] = {};
        newAc[mk] = {...newAc[mk], [today]: next};
        debouncedSet(`completions:${mk}`, newAc[mk]);
        return newAc;
      });

      return next;
    });
  }, [debouncedSet]);

  // Save habit
  const saveHabit = useCallback(async (habitData) => {
    setHabits(prev => {
      const idx = prev.findIndex(h => h.id === habitData.id);
      const next = idx >= 0 ? [...prev.slice(0,idx), habitData, ...prev.slice(idx+1)] : [...prev, habitData];
      debouncedSet('habits', next, 200);
      return next;
    });
  }, [debouncedSet]);

  // Delete habit
  const deleteHabit = useCallback(async (habitId) => {
    setHabits(prev => {
      const next = prev.filter(h => h.id !== habitId);
      debouncedSet('habits', next, 200);
      return next;
    });
  }, [debouncedSet]);

  // Update settings
  const updateSettings = useCallback(async (partial) => {
    setSettings(prev => {
      const next = {...prev, ...partial};
      debouncedSet('settings', next, 200);
      return next;
    });
  }, [debouncedSet]);

  // Save mood
  const saveMood = useCallback(async (moodData) => {
    const today = getToday();
    const mk = getMonthKey(today);

    setAllMoods(prev => {
      const next = {...prev};
      if (!next[mk]) next[mk] = {};
      next[mk] = {...next[mk], [today]: moodData};
      debouncedSet(`mood:${mk}`, next[mk]);
      return next;
    });

    setShowMoodModal(false);
    showToast('Mood saved!', '😊');
  }, [debouncedSet, showToast]);

  // Onboarding complete
  const onOnboardingComplete = useCallback(async (starterHabits) => {
    await Storage.set('onboarding', {completed:true});
    await Storage.set('habits', starterHabits);
    await Storage.set('gamification', {xp:0,level:1,badges:[],challenges:{}});
    await Storage.set('settings', {moodEnabled:true,weekStart:'Monday'});
    setHabits(starterHabits);
    setShowOnboarding(false);
    setLoading(false);
    showToast('Welcome to HabitFlow! 🌊', '🎉');
  }, [showToast]);

  // Context value
  const contextValue = useMemo(() => ({
    habits, todayCompletions, allCompletions, allMoods, streaks, gamification, settings,
    completeHabit, skipHabit, setQtyValue, saveHabit, deleteHabit, updateSettings,
    showToast, triggerConfetti, loadAllData
  }), [habits, todayCompletions, allCompletions, allMoods, streaks, gamification, settings,
    completeHabit, skipHabit, setQtyValue, saveHabit, deleteHabit, updateSettings,
    showToast, triggerConfetti, loadAllData]);

  // Loading screen
  if (loading) {
    return (
      <div className="app-container" style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:'48px',marginBottom:16,animation:'bounce 1.5s infinite'}}>🌊</div>
          <div className="spinner" style={{margin:'0 auto'}} />
        </div>
      </div>
    );
  }

  // Onboarding
  if (showOnboarding) {
    return <Onboarding onComplete={onOnboardingComplete} />;
  }

  const tabs = [
    {id:'today', label:'Today', icon:'☀️'},
    {id:'calendar', label:'Calendar', icon:'📅'},
    {id:'stats', label:'Stats', icon:'📊'},
    {id:'settings', label:'Settings', icon:'⚙️'}
  ];

  return (
    <AppContext.Provider value={contextValue}>
      <div className="app-container">
        {/* Tab Content */}
        <div className="tab-content">
          {activeTab === 'today' && <TodayTab />}
          {activeTab === 'calendar' && <CalendarTab />}
          {activeTab === 'stats' && <StatsTab />}
          {activeTab === 'settings' && <SettingsTab />}
        </div>

        {/* FAB */}
        {activeTab === 'today' && (
          <button className="fab" onClick={() => setShowAddHabit(true)}>+</button>
        )}

        {/* Tab Bar */}
        <div className="tab-bar">
          {tabs.map(tab => (
            <button key={tab.id} className={`tab-btn ${activeTab===tab.id?'active':''}`}
              onClick={() => setActiveTab(tab.id)}>
              <span className="tab-icon">{tab.icon}</span>
              <span>{tab.label}</span>
            </button>
          ))}
        </div>

        {/* Toasts */}
        <ToastContainer toasts={toasts} removeToast={removeToast} />

        {/* Confetti */}
        <Confetti active={showConfetti} onDone={() => setShowConfetti(false)} />

        {/* Mood Modal */}
        {showMoodModal && (
          <MoodModal onSave={saveMood} onClose={() => setShowMoodModal(false)} />
        )}

        {/* Add Habit Modal */}
        {showAddHabit && (
          <HabitModal onSave={async (data) => { await saveHabit(data); setShowAddHabit(false); showToast('Habit created!','✅'); }}
            onClose={() => setShowAddHabit(false)} />
        )}
      </div>
    </AppContext.Provider>
  );
}

/* =================================================================
   MOUNT APP
   ================================================================= */

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

/* =================================================================
   SERVICE WORKER REGISTRATION
   ================================================================= */

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.error);
}
</script>
</body>
</html>
